name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ac910e82abb151969526c7d8f66b79315a12eb6f # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync
      - uses: j178/prek-action@34e114876b0b11c390a56381ad16ebd13914f8d5 # v1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ac910e82abb151969526c7d8f66b79315a12eb6f # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv run ruff format --check .
      - run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@ac910e82abb151969526c7d8f66b79315a12eb6f # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest
